name: Release to Maven Central

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          server-id: ossrh
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Import GPG key
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          KEY_ID=$(gpg --list-secret-keys --keyid-format=LONG | grep sec | head -1 | awk '{print $2}' | cut -d'/' -f2)
          KEYGRIP=$(gpg --list-keys --with-keygrip --keyid-format=LONG "$KEY_ID" | grep Keygrip | head -1 | awk '{print $3}')
          echo "KEY_ID=$KEY_ID" >> $GITHUB_ENV
          echo "KEYGRIP=$KEYGRIP" >> $GITHUB_ENV
          echo "Imported key: $KEY_ID (keygrip: $KEYGRIP)"
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Cache GPG passphrase in agent
        run: |
          echo "$GPG_PASSPHRASE" | gpg-connect-agent "PRESET_PASSPHRASE $KEYGRIP -1 $(echo -n "$GPG_PASSPHRASE" | xxd -p)" /bye
          echo "Passphrase cached in gpg-agent"
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set version in POM
        run: mvn versions:set -DnewVersion=${{ steps.version.outputs.VERSION }} -DgenerateBackupPoms=false

      - name: Build and test
        run: mvn clean verify

      - name: Deploy to Maven Central
        run: mvn clean deploy -pl tibber-java-connector-lib -Dgpg.passphrase="$GPG_PASSPHRASE"
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            tibber-java-connector-lib/target/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
